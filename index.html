    <style>
        /* --- ОСНОВНЫЕ СТИЛИ --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #e0e0e0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        header {
            background: #1f1f1f; padding: 15px 20px; text-align: center; border-bottom: 2px solid #333; position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        h1 { color: #bb86fc; font-size: 1.5rem; margin: 0; }

        /* Стили для счетчиков */
        .stats-bar {
            display: flex; gap: 20px; font-size: 0.85rem; color: #888;
            background: rgba(255, 255, 255, 0.05); padding: 5px 15px; border-radius: 20px;
        }
        .stat-item span { color: #fff; font-weight: bold; margin-left: 5px; }

        .container {
            max-width: 600px; margin: 30px auto; padding: 20px; flex: 1; position: relative; z-index: 5;
        }

        /* Меню режимов */
        .modes { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .mode-btn {
            background: #2c2c2c; color: #aaa; border: 1px solid #444; padding: 10px 15px;
            cursor: pointer; border-radius: 8px; transition: 0.3s; flex: 1; min-width: 100px;
        }
        .mode-btn.active { background: #bb86fc; color: #000; border-color: #bb86fc; font-weight: bold; }

        /* Панели управления */
        .control-panel { background: #1f1f1f; padding: 20px; border-radius: 12px; display: none; }
        .control-panel.active { display: block; animation: slideIn 0.3s; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #bbb; font-size: 0.9rem; }
        
        input, textarea {
            width: 100%; padding: 12px; background: #333; border: 1px solid #444;
            color: white; border-radius: 6px; font-size: 16px;
        }
        input:focus, textarea:focus { outline: 2px solid #bb86fc; border-color: transparent; }

        .action-btn {
            width: 100%; padding: 15px; background: #03dac6; color: #000; border: none;
            border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 10px; transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.98); }
        .action-btn:disabled { background: #555; color: #888; cursor: not-allowed; }

        /* Экран результата */
        .result-display {
            margin-top: 30px; text-align: center; min-height: 150px; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            background: #000; border-radius: 12px; border: 2px dashed #333; padding: 20px;
            position: relative; overflow: hidden;
        }
        
        .big-number { font-size: 5rem; font-weight: bold; color: #bb86fc; line-height: 1; transition: color 0.2s; }
        .sub-text { color: #666; margin-top: 10px; }
        .emoji-result { font-size: 6rem; display: block; transition: transform 0.1s; }

        /* Анимации */
        .blur-anim { filter: blur(2px); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); color: #fff; } 100% { transform: scale(1); } }
        .winner-anim { animation: pop 0.4s ease-out; }

        /* --- АДАПТАЦИЯ ДЛЯ МОБИЛЬНЫХ --- */
        @media (max-width: 600px) {
            .container { padding-right: 40px; }
        }

        /* --- СТИЛИ ДЛЯ ВАШЕЙ АНАЛИТИКИ (Скрытая панель) --- */
        .admin-trigger {
            text-align: center; margin-top: 50px; color: #333; font-size: 10px; cursor: pointer; user-select: none;
        }
        .admin-panel {
            display: none; background: #222; padding: 20px; margin-top: 20px; border-radius: 10px; border: 1px solid #444;
        }
        .admin-panel h3 { color: #03dac6; margin-bottom: 10px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px solid #333; padding: 5px 0; }
    </style>
</head>
<body>

    <header>
        <h1>🎲 Randomizer Pro</h1>
        <!-- Визуальная имитация (показывается пользователям) -->
        <div class="stats-bar">
            <div class="stat-item">Сейчас онлайн: <span id="online-count">42</span></div>
            <div class="stat-item">Всего посещений: <span id="total-count">1,204</span></div>
        </div>
    </header>

    <!-- РЕКЛАМА A-ADS -->

    <div class="container">
        <!-- ВЫБОР РЕЖИМА -->
        <div class="modes">
            <button class="mode-btn active" onclick="setMode('number')">Число</button>
            <button class="mode-btn" onclick="setMode('dice')">Кубик</button>
            <button class="mode-btn" onclick="setMode('coin')">Монетка</button>
            <button class="mode-btn" onclick="setMode('list')">Список</button>
        </div>

        <!-- ПАНЕЛЬ: ЧИСЛО -->
        <div id="panel-number" class="control-panel active">
            <div class="input-group">
                <label>От (минимум)</label>
                <input type="number" id="num-min" value="1">
            </div>
            <div class="input-group">
                <label>До (максимум)</label>
                <input type="number" id="num-max" value="100">
            </div>
            <button class="action-btn" id="btn-number" onclick="startRoulette('number')">Сгенерировать</button>
        </div>

        <!-- ПАНЕЛЬ: КУБИК -->
        <div id="panel-dice" class="control-panel">
            <p style="text-align:center; margin-bottom:15px; color:#aaa;">Бросаем стандартный 6-гранный кубик</p>
            <button class="action-btn" id="btn-dice" onclick="startRoulette('dice')">Бросить кубик</button>
        </div>

        <!-- ПАНЕЛЬ: МОНЕТКА -->
        <div id="panel-coin" class="control-panel">
            <p style="text-align:center; margin-bottom:15px; color:#aaa;">Орёл или решка?</p>
            <button class="action-btn" id="btn-coin" onclick="startRoulette('coin')">Подбросить</button>
        </div>

        <!-- ПАНЕЛЬ: СПИСОК -->
        <div id="panel-list" class="control-panel">
            <div class="input-group">
                <label>Введите варианты (каждый с новой строки):</label>
                <textarea id="list-items" rows="5" placeholder="Пицца&#10;Суши&#10;Бургер"></textarea>
            </div>
            <button class="action-btn" id="btn-list" onclick="startRoulette('list')">Выбрать</button>
        </div>

        <!-- РЕЗУЛЬТАТ -->
        <div class="result-display">
            <div id="main-result" class="big-number">?</div>
            <div id="sub-result" class="sub-text">Нажмите кнопку</div>
        </div>

        <!-- ТРИГГЕР АНАЛИТИКИ -->
        <div class="admin-trigger" onclick="toggleAdminPanel()">
            Статистика
        </div>

        <!-- ПАНЕЛЬ ВАШЕЙ АНАЛИТИКИ -->
        <div id="adminPanel" class="admin-panel">
            <h3>📊 Личная Аналитика (Local)</h3>
            <div class="stat-row">
                <span>Всего посещений (всего):</span>
                <strong id="real-total">0</strong>
            </div>
            <div class="stat-row">
                <span>Посещений сегодня:</span>
                <strong id="real-today">0</strong>
            </div>
            <div style="margin-top:10px; font-size: 0.8rem; color: #666;">
                *Данные сохраняются в браузере пользователя.
            </div>
            <button onclick="resetStats()" style="margin-top:10px; padding: 5px 10px; background: #ef4444; color: white; border:none; border-radius: 4px; cursor: pointer;">Сбросить</button>
        </div>
    </div>

    <script>
        // --- ВАША ЛИЧНАЯ АНАЛИТИКА (БЕЗ СЕРВЕРА) ---
        
        // 1. Получаем данные из памяти браузера или создаем новые
        const todayStr = new Date().toLocaleDateString();
        let stats = JSON.parse(localStorage.getItem('mySiteStats')) || {
            totalVisits: 0,
            lastDate: todayStr,
            todayVisits: 0
        };

        // 2. Проверяем, новый ли день
        if (stats.lastDate !== todayStr) {
            stats.lastDate = todayStr;
            stats.todayVisits = 0;
        }

        // 3. Увеличиваем счетчики
        stats.totalVisits++;
        stats.todayVisits++;

        // 4. Сохраняем обратно
        localStorage.setItem('mySiteStats', JSON.stringify(stats));

        // 5. Показываем в админке
        document.getElementById('real-total').innerText = stats.totalVisits;
        document.getElementById('real-today').innerText = stats.todayVisits;

        // Функция открытия панели
        function toggleAdminPanel() {
            const panel = document.getElementById('adminPanel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
            } else {
                panel.style.display = 'block';
            }
        }

        // Функция сброса
        function resetStats() {
            if(confirm('Сбросить статистику?')) {
                localStorage.removeItem('mySiteStats');
                location.reload();
            }
        }


        // --- ЛОГИКА ИМИТАЦИИ (ДЛЯ ПОКАЗА ВСЕМ) ---
        let onlineUsers = Math.floor(Math.random() * 20) + 10;
        
        // Показываем красивые (фейковые) числа всем
        setInterval(() => {
            let change = Math.floor(Math.random() * 3) - 1; 
            onlineUsers += change;
            if(onlineUsers < 5) onlineUsers = 5;
            document.getElementById('online-count').innerText = onlineUsers;
        }, 3000);

        document.getElementById('total-count').innerText = stats.totalVisits + 1000; // Прибавим немного для красоты


        // --- ОСНОВНАЯ ЛОГИКА РАНДОМАЙЗЕРА ---
        let currentMode = 'number';
        let isSpinning = false;

        function setMode(mode) {
            if(isSpinning) return;
            currentMode = mode;
            document.querySelectorAll('.control-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + mode).classList.add('active');
            
            const btns = document.querySelectorAll('.mode-btn');
            if(mode === 'number') btns[0].classList.add('active');
            if(mode === 'dice') btns[1].classList.add('active');
            if(mode === 'coin') btns[2].classList.add('active');
            if(mode === 'list') btns[3].classList.add('active');

            resetDisplay();
        }

        function resetDisplay() {
            document.getElementById('main-result').innerText = "?";
            document.getElementById('main-result').className = "big-number";
            document.getElementById('sub-result').innerText = "Нажмите кнопку";
        }

        function startRoulette(type) {
            if (isSpinning) return;
            
            if (type === 'number') {
                const min = parseInt(document.getElementById('num-min').value);
                const max = parseInt(document.getElementById('num-max').value);
                if (min >= max) { alert("Минимум должен быть меньше максимума!"); return; }
            }
            if (type === 'list') {
                const items = document.getElementById('list-items').value.split('\n').filter(i => i.trim() !== "");
                if (items.length < 2) { alert("Нужно минимум 2 варианта!"); return; }
            }

            isSpinning = true;
            toggleButtons(true);
            
            const mainDisplay = document.getElementById('main-result');
            const subDisplay = document.getElementById('sub-result');
            
            let duration = 2000;
            let intervalTime = 50;
            let elapsedTime = 0;
            
            mainDisplay.classList.add('blur-anim');

            const timer = setInterval(() => {
                elapsedTime += intervalTime;
                const tempValue = getFakeValue(type);
                updateDisplay(tempValue, type);

                if (elapsedTime > duration * 0.7) {
                    intervalTime += 20;
                }

                if (elapsedTime >= duration) {
                    clearInterval(timer);
                    finishRoulette(type);
                }
            }, intervalTime);
        }

        function getFakeValue(type) {
            if (type === 'number') {
                const min = parseInt(document.getElementById('num-min').value);
                const max = parseInt(document.getElementById('num-max').value);
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }
            if (type === 'dice') {
                const dice = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
                return dice[Math.floor(Math.random() * dice.length)];
            }
            if (type === 'coin') {
                return Math.random() < 0.5 ? "Орёл" : "Решка";
            }
            if (type === 'list') {
                const items = document.getElementById('list-items').value.split('\n').filter(i => i.trim() !== "");
                return items[Math.floor(Math.random() * items.length)];
            }
            return "?";
        }

        function updateDisplay(value, type) {
            const el = document.getElementById('main-result');
            if (type === 'number' || type === 'coin') {
                el.innerText = value;
            } else if (type === 'dice' || type === 'list') {
                el.innerText = value;
            }
        }

        function finishRoulette(type) {
            const el = document.getElementById('main-result');
            const sub = document.getElementById('sub-result');
            
            let finalVal = getFakeValue(type);
            
            el.classList.remove('blur-anim');
            el.classList.remove('big-number'); 
            void el.offsetWidth; 
            el.classList.add('big-number', 'winner-anim');
            
            el.innerText = finalVal;
            
            if (type === 'dice') {
                const map = {'⚀':1, '⚁':2, '⚂':3, '⚃':4, '⚄':5, '⚅':6};
                sub.innerText = `Выпало: ${map[finalVal]}`;
            } else {
                sub.innerText = "Результат";
            }

            isSpinning = false;
            toggleButtons(false);
        }

        function toggleButtons(disabled) {
            const btnId = 'btn-' + currentMode;
            const btn = document.getElementById(btnId);
            if(btn) btn.disabled = disabled;
        }
    </script>
</body>
                </html>
