<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Randomizer Pro</title>
    <meta name="telderi" content="5308c67d684bee84dab47f568d1951f0" />

    <style>
        /* --- ОСНОВНЫЕ СТИЛИ --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #e0e0e0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        header {
            background: #1f1f1f; padding: 15px 20px; text-align: center; border-bottom: 2px solid #333; position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        h1 { color: #bb86fc; font-size: 1.5rem; margin: 0; }

        /* Стили для счетчиков */
        .stats-bar {
            display: flex; gap: 20px; font-size: 0.85rem; color: #888;
            background: rgba(255, 255, 255, 0.05); padding: 5px 15px; border-radius: 20px;
        }
        .stat-item span { color: #fff; font-weight: bold; margin-left: 5px; }

        .container {
            max-width: 600px; margin: 30px auto; padding: 20px; flex: 1; position: relative; z-index: 5;
        }

        /* Меню режимов */
        .modes { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .mode-btn {
            background: #2c2c2c; color: #aaa; border: 1px solid #444; padding: 10px 15px;
            cursor: pointer; border-radius: 8px; transition: 0.3s; flex: 1; min-width: 100px;
        }
        .mode-btn.active { background: #bb86fc; color: #000; border-color: #bb86fc; font-weight: bold; }

        /* Панели управления */
        .control-panel { background: #1f1f1f; padding: 20px; border-radius: 12px; display: none; }
        .control-panel.active { display: block; animation: slideIn 0.3s; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #bbb; font-size: 0.9rem; }
        
        input, textarea {
            width: 100%; padding: 12px; background: #333; border: 1px solid #444;
            color: white; border-radius: 6px; font-size: 16px;
        }
        input:focus, textarea:focus { outline: 2px solid #bb86fc; border-color: transparent; }

        .action-btn {
            width: 100%; padding: 15px; background: #03dac6; color: #000; border: none;
            border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 10px; transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.98); }
        .action-btn:disabled { background: #555; color: #888; cursor: not-allowed; }

        /* Экран результата */
        .result-display {
            margin-top: 30px; text-align: center; min-height: 150px; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            background: #000; border-radius: 12px; border: 2px dashed #333; padding: 20px;
            position: relative; overflow: hidden;
        }
        
        .big-number { font-size: 5rem; font-weight: bold; color: #bb86fc; line-height: 1; transition: color 0.2s; }
        .sub-text { color: #666; margin-top: 10px; }
        .emoji-result { font-size: 6rem; display: block; transition: transform 0.1s; }

        /* Анимации */
        .blur-anim { filter: blur(2px); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); color: #fff; } 100% { transform: scale(1); } }
        .winner-anim { animation: pop 0.4s ease-out; }

        /* АДАПТАЦИЯ */
        @media (max-width: 600px) {
            .container { padding-right: 10px; }
        }

        /* АНАЛИТИКА */
        .admin-trigger { text-align: center; margin-top: 50px; color: #333; font-size: 10px; cursor: pointer; user-select: none; }
        .admin-panel { display: none; background: #222; padding: 20px; margin-top: 20px; border-radius: 10px; border: 1px solid #444; }
        .admin-panel h3 { color: #03dac6; margin-bottom: 10px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px solid #333; padding: 5px 0; }
    </style>
</head>
<body>

    <header>
        <h1>🎲 Randomizer Pro</h1>
        <div class="stats-bar">
            <div class="stat-item">Онлайн: <span id="online-count">42</span></div>
            <div class="stat-item">Всего: <span id="total-count">1,204</span></div>
        </div>
    </header>

    <!-- РЕКЛАМА A-ADS (ИСПРАВЛЕНА: ФИКСИРОВАННЫЙ РАЗМЕР СПРАВА) -->
    <!-- BEGIN AADS AD UNIT 2428588 -->
    <div style="position: absolute; z-index: 99999; top: 0; right: 0;">
        <input autocomplete="off" type="checkbox" id="aadsstickymm0mczim" hidden />
        <div style="padding-top: 0; padding-bottom: 0;">
            <!-- Контейнер с ЖЕСТКИМИ размерами 160x600 -->
            <div style="width: 160px; height: 600px; position: fixed; top: 50%; transform: translateY(-50%); right: 0; background: #000;">
                
                <!-- Кнопка закрытия -->
                <label for="aadsstickymm0mczim" style="position: absolute; top: 10px; left: 10px; width: 24px; height: 24px; background: #ccc; border-radius: 4px; z-index: 100000; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold;">✕</label>
                
                <!-- Iframe с такими же размерами -->
                <iframe data-aa=2428588 src=//acceptable.a-ads.com/2428588/?size=160x600 style='border:0; padding:0; width: 160px; height: 600px; overflow:hidden; margin:0;' frameborder="0"></iframe>

            </div>
            <style>
                #aadsstickymm0mczim:checked + div { display: none; }
            </style>
        </div>
    </div>
    <!-- END AADS AD UNIT 2428588 -->


    <div class="container">
        <!-- ВЫБОР РЕЖИМА -->
        <div class="modes">
            <button class="mode-btn active" onclick="setMode('number')">Число</button>
            <button class="mode-btn" onclick="setMode('dice')">Кубик</button>
            <button class="mode-btn" onclick="setMode('coin')">Монетка</button>
            <button class="mode-btn" onclick="setMode('list')">Список</button>
        </div>

        <!-- ПАНЕЛЬ: ЧИСЛО -->
        <div id="panel-number" class="control-panel active">
            <div class="input-group"><label>От (мин)</label><input type="number" id="num-min" value="1"></div>
            <div class="input-group"><label>До (макс)</label><input type="number" id="num-max" value="100"></div>
            <button class="action-btn" id="btn-number" onclick="startRoulette('number')">Сгенерировать</button>
        </div>

        <!-- ПАНЕЛЬ: КУБИК -->
        <div id="panel-dice" class="control-panel">
            <p style="text-align:center; margin-bottom:15px; color:#aaa;">Бросок кубика</p>
            <button class="action-btn" id="btn-dice" onclick="startRoulette('dice')">Бросить</button>
        </div>

        <!-- ПАНЕЛЬ: МОНЕТКА -->
        <div id="panel-coin" class="control-panel">
            <p style="text-align:center; margin-bottom:15px; color:#aaa;">Монетка</p>
            <button class="action-btn" id="btn-coin" onclick="startRoulette('coin')">Подбросить</button>
        </div>

        <!-- ПАНЕЛЬ: СПИСОК -->
        <div id="panel-list" class="control-panel">
            <div class="input-group"><label>Варианты (по одному в строке):</label><textarea id="list-items" rows="5" placeholder="Пицца&#10;Суши&#10;Бургер"></textarea></div>
            <button class="action-btn" id="btn-list" onclick="startRoulette('list')">Выбрать</button>
        </div>

        <!-- РЕЗУЛЬТАТ -->
        <div class="result-display">
            <div id="main-result" class="big-number">?</div>
            <div id="sub-result" class="sub-text">Нажмите кнопку</div>
        </div>

        <!-- ТРИГГЕР АНАЛИТИКИ -->
        <div class="admin-trigger" onclick="toggleAdminPanel()">Статистика</div>
        <div id="adminPanel" class="admin-panel">
            <h3>📊 Аналитика</h3>
            <div class="stat-row"><span>Всего:</span><strong id="real-total">0</strong></div>
            <div class="stat-row"><span>Сегодня:</span><strong id="real-today">0</strong></div>
            <button onclick="resetStats()" style="margin-top:10px; padding: 5px 10px; background: #ef4444; color: white; border:none; border-radius: 4px; cursor: pointer;">Сброс</button>
        </div>
    </div>

    <script>
        // --- АНАЛИТИКА ---
        const todayStr = new Date().toLocaleDateString();
        let stats = JSON.parse(localStorage.getItem('mySiteStats')) || { totalVisits: 0, lastDate: todayStr, todayVisits: 0 };
        if (stats.lastDate !== todayStr) { stats.lastDate = todayStr; stats.todayVisits = 0; }
        stats.totalVisits++; stats.todayVisits++;
        localStorage.setItem('mySiteStats', JSON.stringify(stats));
        document.getElementById('real-total').innerText = stats.totalVisits;
        document.getElementById('real-today').innerText = stats.todayVisits;
        function toggleAdminPanel() {
            const p = document.getElementById('adminPanel'); p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }
        function resetStats() { if(confirm('Сбросить?')) { localStorage.removeItem('mySiteStats'); location.reload(); } }

        // --- ИМИТАЦИЯ ---
        let onlineUsers = Math.floor(Math.random() * 20) + 10;
        setInterval(() => {
            let change = Math.floor(Math.random() * 3) - 1; onlineUsers += change;
            if(onlineUsers < 5) onlineUsers = 5;
            document.getElementById('online-count').innerText = onlineUsers;
        }, 3000);
        document.getElementById('total-count').innerText = stats.totalVisits + 1000;

        // --- РАНДОМАЙЗЕР ---
        let currentMode = 'number', isSpinning = false;
        function setMode(m) {
            if(isSpinning) return; currentMode = m;
            document.querySelectorAll('.control-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-'+m).classList.add('active');
            const b = document.querySelectorAll('.mode-btn'); 
            if(m=='number')b[0].classList.add('active');if(m=='dice')b[1].classList.add('active');if(m=='coin')b[2].classList.add('active');if(m=='list')b[3].classList.add('active');
            resetDisplay();
        }
        function resetDisplay() { document.getElementById('main-result').innerText = "?"; document.getElementById('main-result').className = "big-number"; document.getElementById('sub-result').innerText = "Нажмите кнопку"; }
        function startRoulette(t) {
            if(isSpinning)return;
            if(t=='number'){const min=parseInt(document.getElementById('num-min').value),max=parseInt(document.getElementById('num-max').value);if(min>=max){alert("Ошибка!");return;}}
            if(t=='list'){const items=document.getElementById('list-items').value.split('\n').filter(i=>i.trim()!=="");if(items.length<2){alert("Мало вариантов!");return;}}
            isSpinning=true; toggleButtons(true);
            const mainD=document.getElementById('main-result'); let duration=2000, intTime=50, time=0;
            mainD.classList.add('blur-anim');
            const timer=setInterval(()=>{
                time+=intTime; updateDisplay(getFake(t),t);
                if(time>duration*0.7)intTime+=20;
                if(time>=duration){clearInterval(timer);finish(t);}
            },intTime);
        }
        function getFake(t){
            if(t=='number'){const min=parseInt(document.getElementById('num-min').value),max=parseInt(document.getElementById('num-max').value);return Math.floor(Math.random()*(max-min+1))+min;}
            if(t=='dice'){const d=['⚀','⚁','⚂','⚃','⚄','⚅'];return d[Math.floor(Math.random()*d.length)];}
            if(t=='coin')return Math.random()<0.5?"Орёл":"Решка";
            if(t=='list'){const i=document.getElementById('list-items').value.split('\n').filter(x=>x.trim()!=="");return i[Math.floor(Math.random()*i.length)];}
            return "?";
        }
        function updateDisplay(v,t){document.getElementById('main-result').innerText=v;}
        function finish(t){
            const el=document.getElementById('main-result'), sub=document.getElementById('sub-result');
            el.classList.remove('blur-anim'); el.classList.remove('big-number'); void el.offsetWidth; el.classList.add('big-number','winner-anim');
            el.innerText=getFake(t);
            if(t=='dice'){const m={'⚀':1,'⚁':2,'⚂':3,'⚃':4,'⚄':5,'⚅':6};sub.innerText=`Выпало: ${m[el.innerText]}`;}
            else sub.innerText="Результат";
            isSpinning=false; toggleButtons(false);
        }
        function toggleButtons(d){const b=document.getElementById('btn-'+currentMode);if(b)b.disabled=d;}
    </script>
</body>
</html>
